<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fight Night — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #08080d;
  background-image: radial-gradient(ellipse at 50% 0%, rgba(0, 255, 136, 0.03) 0%, transparent 60%);
  color: #fff;
  font-family: 'Space Mono', 'SF Mono', Consolas, monospace;
  min-height: 100vh;
  padding: 24px 16px 48px;
  max-width: 600px;
  margin: 0 auto;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

/* ── Header ─────────────────────────────────────────────────── */

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(0, 255, 136, 0.4);
}

.header-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  font-weight: 700;
}

/* ── Config bar ──────────────────────────────────────────────── */

.config-bar {
  background: #0e0e16;
  border: 1px solid rgba(0, 255, 136, 0.1);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
  align-items: center;
}

.config-bar label {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: #6a8a74;
  text-transform: uppercase;
  letter-spacing: 1px;
  white-space: nowrap;
}

.config-bar input {
  flex: 1;
  background: #08080d;
  border: 1px solid rgba(0, 255, 136, 0.1);
  border-radius: 6px;
  color: #fff;
  font-size: 14px;
  padding: 8px 10px;
  outline: none;
}

.config-bar input:focus { border-color: rgba(0, 255, 136, 0.3); }

/* ── Section ─────────────────────────────────────────────────── */

.section {
  background: #0e0e16;
  border: 1px solid rgba(0, 255, 136, 0.1);
  border-radius: 12px;
  margin-bottom: 16px;
  overflow: hidden;
  box-shadow: 0 0 12px rgba(0, 255, 136, 0.02);
}

.section-header {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(0, 255, 136, 0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: #6a8a74;
}

.section-body { padding: 16px; }

/* ── Buttons ─────────────────────────────────────────────────── */

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 20px;
  border-radius: 10px;
  border: none;
  font-family: 'Space Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.1s, transform 0.1s;
  width: 100%;
  text-align: center;
  line-height: 1;
}

.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

.btn-primary {
  background: #00ff88;
  color: #000;
}

.btn-primary:hover {
  box-shadow: 0 0 16px rgba(0, 255, 136, 0.3);
}

.btn-danger {
  background: rgba(255, 68, 102, 0.08);
  color: #ff4466;
  border: 1px solid rgba(255, 68, 102, 0.2);
}

.btn-warning {
  background: rgba(255, 187, 36, 0.08);
  color: #fbbf24;
  border: 1px solid rgba(255, 187, 36, 0.2);
}

.btn-secondary {
  background: #1a1a28;
  color: #ccc;
  border: 1px solid rgba(0, 255, 136, 0.1);
}

.btn-row {
  display: flex;
  gap: 10px;
}

.btn-row .btn { flex: 1; }

/* ── Toast ───────────────────────────────────────────────────── */

.toast-container {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 100;
  pointer-events: none;
}

.toast {
  background: #1a1a28;
  border: 1px solid rgba(0, 255, 136, 0.1);
  border-radius: 10px;
  padding: 12px 18px;
  font-size: 15px;
  max-width: 340px;
  text-align: center;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.2s, transform 0.2s;
}

.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok  { border-color: rgba(0, 255, 136, 0.25); color: #00ff88; }
.toast.err { border-color: rgba(255, 68, 102, 0.2); color: #ff4466; }

/* ── Status banner ────────────────────────────────────────────── */

.status-banner {
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}

.status-banner.loaded {
  display: block;
  background: rgba(0, 255, 136, 0.08);
  border: 1px solid rgba(0, 255, 136, 0.25);
  color: #00ff88;
}

.status-banner.error {
  display: block;
  background: rgba(255, 68, 102, 0.08);
  border: 1px solid rgba(255, 68, 102, 0.2);
  color: #ff4466;
}

/* ── Match card ───────────────────────────────────────────────── */

.match-card {
  background: #08080d;
  border: 1px solid rgba(0, 255, 136, 0.1);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 12px;
}

.match-card-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #6a8a74;
  margin-bottom: 10px;
}

.match-vs {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 12px;
}

.match-entry {
  flex: 1;
  background: #14141f;
  border-radius: 8px;
  padding: 10px 12px;
}

.match-entry-name { font-size: 17px; font-weight: 700; }
.match-entry-char { font-size: 11px; color: #888; margin-top: 2px; }

.match-sep { color: #6a8a74; font-size: 12px; font-weight: 700; flex-shrink: 0; }

.match-status-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 100px;
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.badge-pending  { background: #1a1a28; color: #6a8a74; }
.badge-playing  { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.25); }
.badge-complete { background: #2a1e00; color: #fbbf24; border: 1px solid #6a4a00; }
.badge-bye      { background: #1a1a28; color: #6a8a74; }
.badge-coinflip { background: rgba(170, 102, 255, 0.08); color: #aa66ff; border: 1px solid rgba(170, 102, 255, 0.2); }

/* ── Forms ───────────────────────────────────────────────────── */

.form-group {
  margin-bottom: 14px;
}

.form-group label {
  display: block;
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #6a8a74;
  margin-bottom: 6px;
}

.form-group input,
.form-group select {
  width: 100%;
  background: #08080d;
  border: 1px solid rgba(0, 255, 136, 0.1);
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
}

.form-group input:focus,
.form-group select:focus { border-color: rgba(0, 255, 136, 0.3); }

.form-group select option { background: #14141f; }

.form-hint {
  font-size: 11px;
  color: #6a8a74;
  margin-top: 5px;
}

/* ── Entry list (create tournament) ──────────────────────────── */

.entries-list { margin-bottom: 12px; }

.entry-row {
  display: grid;
  grid-template-columns: 1fr 1fr auto 1fr auto;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}

.rand-btn {
  background: rgba(0, 255, 136, 0.08);
  border: 1px solid rgba(0, 255, 136, 0.15);
  border-radius: 6px;
  color: #00ff88;
  font-size: 14px;
  cursor: pointer;
  padding: 8px 10px;
  line-height: 1;
  white-space: nowrap;
}
.rand-btn:hover { background: rgba(0, 255, 136, 0.15); }

.entry-row input,
.entry-row select {
  background: #08080d;
  border: 1px solid rgba(0, 255, 136, 0.1);
  border-radius: 6px;
  color: #fff;
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  width: 100%;
  min-width: 0;
}

.entry-row input:focus,
.entry-row select:focus { border-color: rgba(0, 255, 136, 0.3); }

.entry-row .remove-btn {
  background: none;
  border: none;
  color: #6a8a74;
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}

.entry-row .remove-btn:hover { color: #ff4466; }

.entry-header {
  display: grid;
  grid-template-columns: 1fr 1fr auto 1fr auto;
  gap: 8px;
  margin-bottom: 6px;
}

/* ── Registered fighters table ─────────────────────────────── */

.registered-list { margin-bottom: 12px; }

.registered-entry {
  display: grid;
  grid-template-columns: 30px 1fr 1fr 90px;
  gap: 8px;
  padding: 8px 10px;
  align-items: center;
  border-bottom: 1px solid rgba(0, 255, 136, 0.05);
  font-size: 13px;
}
.registered-entry:last-child { border-bottom: none; }
.registered-num { color: #6a8a74; font-size: 11px; font-family: 'Orbitron', sans-serif; }
.registered-name { color: #fff; font-weight: 700; }
.registered-registrant { color: #6a8a74; font-size: 12px; }
.registered-char { color: #00ff88; font-size: 12px; font-family: 'Orbitron', sans-serif; }

.entry-header span {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #6a8a74;
  padding: 0 10px;
}

/* ── Force-advance form ──────────────────────────────────────── */

.force-form {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.force-form input,
.force-form select {
  flex: 1;
  min-width: 80px;
  background: #08080d;
  border: 1px solid rgba(0, 255, 136, 0.1);
  border-radius: 8px;
  color: #fff;
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
}

/* ── Loading spinner ─────────────────────────────────────────── */

.spinner {
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 2px solid #3a5a44;
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Tournament select ───────────────────────────────────────── */

.tournament-select-row {
  display: flex;
  gap: 8px;
}

.tournament-select-row select {
  flex: 1;
}

/* ── Champion ────────────────────────────────────────────────── */

.champion-card {
  display: none;
  background: linear-gradient(135deg, #1a0f00, #2a1e00);
  border: 1px solid rgba(251, 191, 36, 0.3);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
  margin-bottom: 16px;
}

.champion-card.show { display: block; }
.champion-label { font-family: 'Orbitron', sans-serif; font-size: 11px; color: #aa8a30; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.champion-name { font-family: 'Orbitron', sans-serif; font-size: 30px; font-weight: 700; color: #fbbf24; }
.champion-char { font-size: 13px; color: #997a30; margin-top: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">No Johns</div>
  <div class="header-title">Admin Panel</div>
  <div style="font-size: 11px; color: #3a5a44;">Fight Night</div>
</div>

<!-- Config bar -->
<div class="config-bar">
  <label>Arena</label>
  <input type="text" id="arena-url" value="" placeholder="https://nojohns-arena-production.up.railway.app">
  <label>Token</label>
  <input type="password" id="admin-token" placeholder="optional">
</div>

<!-- Status banner -->
<div id="status-banner" class="status-banner"></div>

<!-- Champion card -->
<div id="champion-card" class="champion-card">
  <div class="champion-label">🏆 Champion</div>
  <div class="champion-name" id="champion-name">—</div>
  <div class="champion-char" id="champion-char"></div>
</div>

<!-- ── Tournament selector ──────────────────────────────────── -->
<div class="section">
  <div class="section-header">
    <span class="section-title">Tournament</span>
    <button class="btn btn-secondary" style="width:auto;padding:8px 14px;font-size:13px;" onclick="refreshTournamentList()">Refresh</button>
  </div>
  <div class="section-body">
    <div class="tournament-select-row form-group" style="margin-bottom:0;">
      <select id="tournament-select" onchange="loadTournament()">
        <option value="">— select tournament —</option>
      </select>
      <button class="btn btn-secondary" style="width:auto;padding:10px 14px;font-size:14px;" onclick="loadTournament()">Load</button>
    </div>
    <button class="btn btn-secondary" id="btn-feature" style="display:none; width:auto; margin-top:10px; padding:8px 14px; font-size:13px;" onclick="toggleFeatured()">
      ☆ Feature on Homepage
    </button>
  </div>
</div>

<!-- ── Match controls ───────────────────────────────────────── -->
<div class="section" id="match-controls-section" style="display:none;">
  <div class="section-header">
    <span class="section-title">Match Controls</span>
    <span id="current-match-badge" class="match-status-badge badge-pending">No match</span>
  </div>
  <div class="section-body">

    <!-- Current match display -->
    <div id="current-match-card" class="match-card" style="display:none;">
      <div class="match-card-label" id="current-match-round">—</div>
      <div class="match-vs">
        <div class="match-entry">
          <div class="match-entry-name" id="match-a-name">—</div>
          <div class="match-entry-char" id="match-a-char"></div>
        </div>
        <div class="match-sep">VS</div>
        <div class="match-entry">
          <div class="match-entry-name" id="match-b-name">—</div>
          <div class="match-entry-char" id="match-b-char"></div>
        </div>
      </div>
    </div>

    <!-- Start next -->
    <button class="btn btn-primary" id="btn-next" onclick="startNext()" style="margin-bottom:10px;">
      ▶ Start Next Match
    </button>

    <!-- Report result -->
    <div id="report-form" style="display:none; margin-bottom:10px;">
      <div class="form-group" style="margin-bottom:8px;">
        <label>Winner</label>
        <select id="result-winner">
          <option value="">— select winner —</option>
        </select>
      </div>
      <div class="btn-row">
        <div class="form-group" style="flex:1; margin-bottom:0;">
          <label>Score A</label>
          <input type="number" id="result-score-a" min="0" max="4" placeholder="stocks">
        </div>
        <div class="form-group" style="flex:1; margin-bottom:0;">
          <label>Score B</label>
          <input type="number" id="result-score-b" min="0" max="4" placeholder="stocks">
        </div>
      </div>
      <button class="btn btn-warning" onclick="reportResult()" style="margin-top:10px;">
        ✓ Submit Result
      </button>
    </div>

    <!-- Toggle report form -->
    <button class="btn btn-secondary" id="btn-report-toggle" onclick="toggleReportForm()" style="display:none;">
      Record Match Result
    </button>
  </div>
</div>

<!-- ── Force-advance ─────────────────────────────────────────── -->
<div class="section" id="force-section" style="display:none;">
  <div class="section-header">
    <span class="section-title">Force Advance</span>
  </div>
  <div class="section-body">
    <p style="font-size:13px; color:#6a8a74; margin-bottom:12px;">Override any match regardless of status. Use for timeouts, disconnects, and admin decisions.</p>
    <div class="force-form">
      <input type="number" id="force-round" min="0" placeholder="Round #">
      <input type="number" id="force-slot" min="0" placeholder="Slot #">
      <input type="text" id="force-winner" placeholder="Winner name">
    </div>
    <button class="btn btn-danger" onclick="forceAdvance()" style="margin-top:10px;">
      ⚡ Force Advance
    </button>
  </div>
</div>

<!-- ── Create tournament ─────────────────────────────────────── -->
<div class="section" id="create-section">
  <div class="section-header">
    <span class="section-title">Create Tournament</span>
  </div>
  <div class="section-body">
    <div class="form-group">
      <label>Tournament Name</label>
      <input type="text" id="new-name" value="Fight Night — March 11" placeholder="Tournament name">
    </div>
    <button class="btn btn-primary" onclick="createTournament()">Create Tournament</button>
  </div>
</div>

<!-- ── Registration ────────────────────────────────────────── -->
<div class="section" id="registration-section" style="display:none;">
  <div class="section-header">
    <span class="section-title">Registration</span>
    <span class="match-status-badge badge-pending" id="reg-count">0 fighters</span>
  </div>
  <div class="section-body">

    <!-- Registered fighters list -->
    <div class="registered-list" id="registered-list">
      <!-- Populated dynamically -->
    </div>

    <!-- Register new fighter -->
    <div style="border: 1px solid rgba(0, 255, 136, 0.08); border-radius: 8px; padding: 12px; margin-bottom: 12px; background: rgba(0,255,136,0.02);">
      <div class="form-group" style="margin-bottom:10px;">
        <label>Registrant</label>
        <input type="text" id="reg-registrant" placeholder="Who's signing up?">
      </div>
      <div style="display:flex; gap:8px; margin-bottom:10px; align-items:end;">
        <div class="form-group" style="flex:1; margin-bottom:0;">
          <label>Fighter Name</label>
          <input type="text" id="reg-fighter-name" placeholder="Bot name">
        </div>
        <button class="rand-btn" onclick="randomizeFighterName()" title="Random name">🎲</button>
      </div>
      <div class="form-group" style="margin-bottom:10px;">
        <label>Character</label>
        <select id="reg-character"></select>
      </div>
      <button class="btn btn-primary" onclick="registerFighter()">+ Register Fighter</button>
    </div>

    <!-- Close registration -->
    <button class="btn btn-warning" onclick="closeRegistration()" id="btn-close-reg">
      Lock Entries & Generate Bracket
    </button>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script>
// ── State ─────────────────────────────────────────────────────

let currentTournament = null;
let currentMatch = null; // { round, slot, entry_a, entry_b }
let pollInterval = null;

const CHARACTERS = [
  'RANDOM',
  'FOX','FALCO','MARTH','SHEIK','JIGGLYPUFF','PEACH','CPTFALCON',
  'PIKACHU','SAMUS','DRMARIO','LINK','YOUNGLINK','MEWTWO','ROY',
  'GANONDORF','LUIGI','MARIO','YOSHI','DONKEYKONG','NESS','PICHU',
  'GAMEANDWATCH','KIRBY','BOWSER','ZELDA',
];

// ── Utils ─────────────────────────────────────────────────────

function arenaUrl() {
  const el = document.getElementById('arena-url');
  const val = el.value.trim();
  if (val) return val.replace(/\/$/, '');
  const params = new URLSearchParams(location.search);
  return (params.get('arena') || 'https://nojohns-arena-production.up.railway.app').replace(/\/$/, '');
}

function authHeaders() {
  const token = document.getElementById('admin-token').value.trim();
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = `Bearer ${token}`;
  return h;
}

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 3500);
}

function setBanner(msg, type) {
  const b = document.getElementById('status-banner');
  b.className = `status-banner ${type}`;
  b.textContent = msg;
}

async function apiFetch(path, options = {}) {
  const res = await fetch(arenaUrl() + path, {
    headers: authHeaders(),
    ...options,
  });
  if (!res.ok) {
    let detail = res.statusText;
    try { detail = (await res.json()).detail || detail; } catch {}
    throw new Error(`${res.status} ${detail}`);
  }
  return res.json();
}

// ── Tournament list ───────────────────────────────────────────

async function refreshTournamentList() {
  try {
    const data = await apiFetch('/tournaments');
    const sel = document.getElementById('tournament-select');
    const prev = sel.value;
    sel.innerHTML = '<option value="">— select tournament —</option>';
    for (const t of data.tournaments) {
      const opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = `${t.name} (${t.status})`;
      if (t.id === prev) opt.selected = true;
      sel.appendChild(opt);
    }
    if (data.count === 0) {
      setBanner('No tournaments yet — create one below.', 'loaded');
    }
  } catch (e) {
    setBanner(`Cannot reach arena: ${e.message}`, 'error');
  }
}

async function loadTournament() {
  const id = document.getElementById('tournament-select').value;
  if (!id) return;
  try {
    const data = await apiFetch(`/tournaments/${id}`);
    currentTournament = data;
    renderTournamentState(data);
    setBanner(`Loaded: ${data.name} — ${data.status}`, 'loaded');
    startPolling(id);
  } catch (e) {
    setBanner(`Failed to load: ${e.message}`, 'error');
  }
}

function startPolling(id) {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const data = await apiFetch(`/tournaments/${id}`);
      currentTournament = data;
      renderTournamentState(data);
    } catch {}
  }, 4000);
}

// ── Render tournament state ───────────────────────────────────

function renderTournamentState(t) {
  // Feature button
  updateFeatureButton(t);

  // Handle registration vs bracket mode
  showRegistrationUI(t);

  if (t.status === 'registration') {
    document.getElementById('match-controls-section').style.display = 'none';
    document.getElementById('force-section').style.display = 'none';
    return;
  }

  // Show controls
  document.getElementById('match-controls-section').style.display = '';
  document.getElementById('force-section').style.display = '';

  // Champion
  const champ = t.bracket?.rounds?.at(-1)?.[0]?.winner;
  if (champ) {
    document.getElementById('champion-card').classList.add('show');
    document.getElementById('champion-name').textContent = champ.name;
    document.getElementById('champion-char').textContent = champ.character;
  } else {
    document.getElementById('champion-card').classList.remove('show');
  }

  // Find current/next match
  currentMatch = null;
  if (!t.bracket?.rounds) { updateMatchCard(null); populateWinnerSelect(null); return; }
  for (const round of t.bracket.rounds) {
    for (const m of round) {
      if (m.status === 'playing') { currentMatch = m; break; }
    }
    if (currentMatch) break;
  }
  if (!currentMatch) {
    // Find next pending
    for (const round of t.bracket.rounds) {
      for (const m of round) {
        if (m.status === 'pending' && m.entry_a && m.entry_b) { currentMatch = m; break; }
      }
      if (currentMatch) break;
    }
  }

  updateMatchCard(currentMatch);
  populateWinnerSelect(currentMatch);
}

function updateMatchCard(m) {
  const card = document.getElementById('current-match-card');
  const badge = document.getElementById('current-match-badge');
  const btnToggle = document.getElementById('btn-report-toggle');

  if (!m) {
    card.style.display = 'none';
    badge.textContent = 'No match';
    badge.className = 'match-status-badge badge-pending';
    btnToggle.style.display = 'none';
    return;
  }

  card.style.display = '';
  badge.textContent = m.status.toUpperCase();
  badge.className = `match-status-badge badge-${m.status}`;

  const rLabel = `Round ${m.round + 1} · Match ${m.slot + 1}`;
  document.getElementById('current-match-round').textContent = rLabel;
  document.getElementById('match-a-name').textContent = m.entry_a?.name ?? '—';
  document.getElementById('match-a-char').textContent = m.entry_a?.character ?? '';
  document.getElementById('match-b-name').textContent = m.entry_b?.name ?? '—';
  document.getElementById('match-b-char').textContent = m.entry_b?.character ?? '';

  // Show report toggle if match is playing or pending-with-entries
  btnToggle.style.display = (m.entry_a && m.entry_b && m.status !== 'complete') ? '' : 'none';
}

function populateWinnerSelect(m) {
  const sel = document.getElementById('result-winner');
  sel.innerHTML = '<option value="">— select winner —</option>';
  if (!m) return;
  if (m.entry_a) {
    const o = document.createElement('option');
    o.value = m.entry_a.name;
    o.textContent = m.entry_a.name;
    sel.appendChild(o);
  }
  if (m.entry_b) {
    const o = document.createElement('option');
    o.value = m.entry_b.name;
    o.textContent = m.entry_b.name;
    sel.appendChild(o);
  }
}

// ── Actions ───────────────────────────────────────────────────

async function startNext() {
  if (!currentTournament) return toast('No tournament loaded', 'err');
  const btn = document.getElementById('btn-next');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Starting…';
  try {
    const data = await apiFetch(`/tournaments/${currentTournament.id}/next`, { method: 'POST' });
    if (data.queued) {
      const m = data.match;
      toast(`Queued: ${m.entry_a?.name ?? '?'} vs ${m.entry_b?.name ?? '?'}`, 'ok');
    } else {
      toast(data.message || 'No match queued', 'err');
    }
    // Refresh
    const t = await apiFetch(`/tournaments/${currentTournament.id}`);
    currentTournament = t;
    renderTournamentState(t);
  } catch (e) {
    toast(`Failed: ${e.message}`, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '▶ Start Next Match';
  }
}

function toggleReportForm() {
  const form = document.getElementById('report-form');
  const visible = form.style.display !== 'none';
  form.style.display = visible ? 'none' : '';
  document.getElementById('btn-report-toggle').textContent = visible
    ? 'Record Match Result'
    : 'Hide';
}

async function reportResult() {
  if (!currentTournament || !currentMatch) return toast('No active match', 'err');
  const winner = document.getElementById('result-winner').value;
  if (!winner) return toast('Select a winner', 'err');
  const scoreA = document.getElementById('result-score-a').value;
  const scoreB = document.getElementById('result-score-b').value;

  if (!confirm(`Declare winner: ${winner}?`)) return;

  try {
    await apiFetch(`/tournaments/${currentTournament.id}/advance`, {
      method: 'POST',
      body: JSON.stringify({
        round: currentMatch.round,
        slot: currentMatch.slot,
        winner_name: winner,
        score_a: scoreA !== '' ? parseInt(scoreA) : null,
        score_b: scoreB !== '' ? parseInt(scoreB) : null,
      }),
    });
    toast(`${winner} advances!`, 'ok');
    document.getElementById('report-form').style.display = 'none';
    document.getElementById('btn-report-toggle').textContent = 'Record Match Result';
    const t = await apiFetch(`/tournaments/${currentTournament.id}`);
    currentTournament = t;
    renderTournamentState(t);
  } catch (e) {
    toast(`Failed: ${e.message}`, 'err');
  }
}

async function forceAdvance() {
  if (!currentTournament) return toast('No tournament loaded', 'err');
  const round = parseInt(document.getElementById('force-round').value);
  const slot = parseInt(document.getElementById('force-slot').value);
  const winner = document.getElementById('force-winner').value.trim();

  if (isNaN(round) || isNaN(slot) || !winner) {
    return toast('Fill in round, slot, and winner', 'err');
  }

  if (!confirm(`Force advance Round ${round} Slot ${slot} → ${winner}?`)) return;

  try {
    await apiFetch(`/admin/tournaments/${currentTournament.id}/force-advance`, {
      method: 'POST',
      body: JSON.stringify({ round, slot, winner_name: winner }),
    });
    toast(`Force-advanced: ${winner}`, 'ok');
    const t = await apiFetch(`/tournaments/${currentTournament.id}`);
    currentTournament = t;
    renderTournamentState(t);
  } catch (e) {
    toast(`Failed: ${e.message}`, 'err');
  }
}

// ── Feature toggle ────────────────────────────────────────────

function updateFeatureButton(t) {
  const btn = document.getElementById('btn-feature');
  if (!t) { btn.style.display = 'none'; return; }
  btn.style.display = '';
  if (t.featured) {
    btn.textContent = '★ Featured on Homepage';
    btn.style.background = 'rgba(251, 191, 36, 0.15)';
    btn.style.borderColor = 'rgba(251, 191, 36, 0.3)';
    btn.style.color = '#fbbf24';
  } else {
    btn.textContent = '☆ Feature on Homepage';
    btn.style.background = '';
    btn.style.borderColor = '';
    btn.style.color = '';
  }
}

async function toggleFeatured() {
  if (!currentTournament) return;
  try {
    const t = await apiFetch(`/tournaments/${currentTournament.id}/feature`, { method: 'POST' });
    currentTournament = t;
    updateFeatureButton(t);
    toast(t.featured ? 'Featured on homepage' : 'Removed from homepage', 'ok');
  } catch (e) {
    toast(`Failed: ${e.message}`, 'err');
  }
}

// ── Random fighter names ──────────────────────────────────────

const FIGHTER_ADJECTIVES = [
  'Shadow','Turbo','Hyper','Mega','Ultra','Cosmic','Phantom','Neon','Cyber','Astral',
  'Blazing','Frozen','Thunder','Iron','Crystal','Quantum','Void','Apex','Rogue','Solar',
  'Savage','Crimson','Silent','Dark','Golden','Primal','Sonic','Arcane','Titan','Feral',
];
const FIGHTER_NOUNS = [
  'Fox','Hawk','Wolf','Viper','Falcon','Phoenix','Dragon','Mantis','Cobra','Panther',
  'Raptor','Lynx','Jaguar','Raven','Serpent','Tiger','Shark','Hornet','Sphinx','Hydra',
  'Blade','Fang','Storm','Bolt','Hammer','Arrow','Pulse','Flare','Drift','Crush',
];

function randomFighterName() {
  const adj = FIGHTER_ADJECTIVES[Math.floor(Math.random() * FIGHTER_ADJECTIVES.length)];
  const noun = FIGHTER_NOUNS[Math.floor(Math.random() * FIGHTER_NOUNS.length)];
  return `${adj} ${noun}`;
}

function randomizeFighterName() {
  document.getElementById('reg-fighter-name').value = randomFighterName();
}

// ── Create tournament ─────────────────────────────────────────

async function createTournament() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) return toast('Enter a tournament name', 'err');

  try {
    const t = await apiFetch('/tournaments', {
      method: 'POST',
      body: JSON.stringify({ name }),
    });
    toast(`Created: ${t.name}`, 'ok');
    await refreshTournamentList();
    document.getElementById('tournament-select').value = t.id;
    currentTournament = t;
    showRegistrationUI(t);
    setBanner(`Created: ${t.name} — add fighters below`, 'loaded');
    startPolling(t.id);
  } catch (e) {
    toast(`Failed: ${e.message}`, 'err');
  }
}

// ── Registration ──────────────────────────────────────────────

function showRegistrationUI(t) {
  const section = document.getElementById('registration-section');
  if (t.status === 'registration') {
    section.style.display = '';
    document.getElementById('create-section').style.display = 'none';
    renderRegisteredList(t.entries || []);
  } else {
    section.style.display = 'none';
  }
}

function renderRegisteredList(entries) {
  const list = document.getElementById('registered-list');
  const count = document.getElementById('reg-count');
  count.textContent = `${entries.length} fighter${entries.length !== 1 ? 's' : ''}`;

  if (entries.length === 0) {
    list.innerHTML = '<div style="color:#6a8a74; font-size:13px; padding:8px 0;">No fighters registered yet.</div>';
    return;
  }
  list.innerHTML = entries.map((e, i) => `
    <div class="registered-entry">
      <span class="registered-num">#${i + 1}</span>
      <span class="registered-name">${e.name}</span>
      <span class="registered-registrant">${e.registrant || '—'}</span>
      <span class="registered-char">${e.character}</span>
    </div>
  `).join('');
}

async function registerFighter() {
  if (!currentTournament) return toast('No tournament loaded', 'err');

  const registrant = document.getElementById('reg-registrant').value.trim();
  const name = document.getElementById('reg-fighter-name').value.trim();
  const character = document.getElementById('reg-character').value;

  if (!name) return toast('Enter a fighter name', 'err');

  try {
    const t = await apiFetch(`/tournaments/${currentTournament.id}/register`, {
      method: 'POST',
      body: JSON.stringify({ name, character, registrant: registrant || null }),
    });
    toast(`Registered: ${name}`, 'ok');
    currentTournament = t;
    renderRegisteredList(t.entries || []);
    // Clear inputs for next entry
    document.getElementById('reg-registrant').value = '';
    document.getElementById('reg-fighter-name').value = '';
    document.getElementById('reg-registrant').focus();
  } catch (e) {
    toast(`Failed: ${e.message}`, 'err');
  }
}

async function closeRegistration() {
  if (!currentTournament) return toast('No tournament loaded', 'err');
  const n = (currentTournament.entries || []).length;
  if (n < 2) return toast(`Need at least 2 fighters (have ${n})`, 'err');

  if (!confirm(`Lock registration with ${n} fighters and generate bracket?`)) return;

  try {
    const t = await apiFetch(`/tournaments/${currentTournament.id}/close-registration`, {
      method: 'POST',
    });
    toast(`Bracket generated! ${n} fighters locked.`, 'ok');
    currentTournament = t;
    document.getElementById('registration-section').style.display = 'none';
    renderTournamentState(t);
    setBanner(`${t.name} — bracket ready`, 'loaded');
  } catch (e) {
    toast(`Failed: ${e.message}`, 'err');
  }
}

// ── Init ──────────────────────────────────────────────────────

// Populate character dropdown
(function() {
  const sel = document.getElementById('reg-character');
  sel.innerHTML = CHARACTERS.map(c => `<option value="${c}">${c}</option>`).join('');
})();

refreshTournamentList();
</script>
