<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Fight Night — No Johns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #08080d;
  background-image: radial-gradient(ellipse at 50% 0%, rgba(0, 255, 136, 0.03) 0%, transparent 60%);
  color: #fff;
  font-family: 'Space Mono', 'SF Mono', Consolas, monospace;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

/* ── Nav Bar ──────────────────────────────────────────────── */

.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  height: 56px;
  border-bottom: 1px solid rgba(0, 255, 136, 0.08);
  flex-shrink: 0;
  z-index: 10;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.nav-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #6a8a74;
}

.nav-divider {
  width: 1px;
  height: 20px;
  background: rgba(0, 255, 136, 0.15);
}

.nav-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 700;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.nav-link {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #6a8a74;
  text-decoration: none;
  padding: 6px 12px;
  border: 1px solid rgba(0, 255, 136, 0.1);
  border-radius: 4px;
  transition: all 0.2s;
}
.nav-link:hover { color: #00ff88; border-color: rgba(0, 255, 136, 0.3); }

.status-pill {
  font-family: 'Orbitron', sans-serif;
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.status-pill.pending     { background: rgba(0, 255, 136, 0.08); color: #555; }
.status-pill.registration { background: rgba(0, 255, 136, 0.08); color: #6a8a74; }
.status-pill.active      { background: rgba(0, 255, 136, 0.08); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.25); }
.status-pill.complete    { background: #1a1400; color: #fbbf24; border: 1px solid #6a5000; }

/* ── Champion Banner ──────────────────────────────────────── */

.champion-banner {
  display: none;
  font-family: 'Orbitron', sans-serif;
  background: linear-gradient(90deg, #1a1400, #1a1400);
  border-bottom: 1px solid #6a5000;
  padding: 10px 32px;
  text-align: center;
  font-size: 22px;
  color: #fbbf24;
  font-weight: 700;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.champion-banner.visible { display: block; }

/* ── Main Layout: two panels ──────────────────────────────── */

.main {
  flex: 1;
  display: grid;
  grid-template-columns: 55fr 45fr;
  min-height: 0;
}

/* ── Left Panel: Bracket ──────────────────────────────────── */

.panel-bracket {
  position: relative;
  overflow: auto;
  border-right: 1px solid rgba(0, 255, 136, 0.06);
  padding: 20px 24px 80px;
  scrollbar-width: none;
}
.panel-bracket::-webkit-scrollbar { display: none; }

.bracket {
  display: flex;
  flex-direction: row;
  gap: 0;
  position: relative;
  z-index: 1;
  min-height: 100%;
}

.round-col {
  display: flex;
  flex-direction: column;
  min-width: 210px;
  width: 210px;
}

.round-title {
  font-family: 'Orbitron', sans-serif;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #6a8a74;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.round-matches {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
}

/* ── Match Card ───────────────────────────────────────────── */

.match-slot {
  display: flex;
  align-items: center;
  padding: 0 6px;
  min-height: 80px;
}

.match-card {
  width: 100%;
  border: 1px solid rgba(0, 255, 136, 0.08);
  border-radius: 6px;
  overflow: hidden;
  background: #0e0e16;
  transition: border-color 0.4s, box-shadow 0.4s;
}

.match-card.playing {
  border-color: rgba(0, 255, 136, 0.25);
  box-shadow: 0 0 20px rgba(0, 255, 136, 0.15), 0 0 40px rgba(0, 255, 136, 0.04);
}
.match-card.complete { border-color: rgba(0, 255, 136, 0.08); }
.match-card.bye      { background: #0a0a0a; border-color: #161616; }
.match-card.coinflip { border-color: rgba(170, 102, 255, 0.25); }
.match-card.pending  { border-color: rgba(0, 255, 136, 0.08); }

.match-badge {
  font-family: 'Orbitron', sans-serif;
  padding: 2px 8px;
  text-align: center;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
}
.match-badge.live      { background: #00ff88; color: #000; animation: pulse 1.8s ease-in-out infinite; }
.match-badge.bye-label { background: rgba(0, 255, 136, 0.08); color: #6a8a74; }
.match-badge.coinflip  { background: #2a1a3a; color: #aa66ff; }

.entry-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  min-height: 36px;
}
.entry-row + .entry-row { border-top: 1px solid rgba(0, 255, 136, 0.08); }
.entry-row.winner { background: rgba(0, 255, 136, 0.06); }
.entry-row.loser  { opacity: 0.38; }

.char-tag {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: #6a8a74;
  flex-shrink: 0;
  width: 38px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
}

.entry-name {
  font-family: 'Space Mono', monospace;
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.entry-score {
  font-size: 14px;
  font-weight: 700;
  color: #00ff88;
  flex-shrink: 0;
}

.tbd-row {
  color: rgba(0, 255, 136, 0.15);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.connectors {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ── Right Panel ──────────────────────────────────────────── */

.panel-right {
  display: flex;
  flex-direction: column;
  padding: 20px 24px;
  gap: 12px;
  min-height: 0;
}

/* Current match — takes ~2/3 of right panel */
.current-match {
  border: 1px solid rgba(0, 255, 136, 0.1);
  border-radius: 10px;
  background: #0e0e16;
  flex: 4;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.current-match-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(0, 255, 136, 0.06);
}

.current-match-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #00ff88;
}

.current-match-round {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  color: #6a8a74;
  letter-spacing: 1px;
}

.current-match-body {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  min-height: 0;
}

.current-match-vs {
  display: flex;
  align-items: center;
  gap: 32px;
  width: 100%;
  justify-content: center;
}

.current-fighter {
  text-align: center;
  flex: 1;
  max-width: 200px;
}

.current-fighter-char {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: #6a8a74;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.current-fighter-name {
  font-family: 'Space Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.current-vs-sep {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #3a5a44;
  letter-spacing: 2px;
}

.current-match-waiting {
  color: #3a5a44;
  font-size: 14px;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
}

/* Stream area — live match stats + SVG animation */
.stream-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-top: 1px solid rgba(255, 107, 53, 0.15);
  color: #1a2a1f;
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  min-height: 120px;
  position: relative;
  overflow: hidden;
}

.stream-canvas-wrap {
  position: relative;
  width: 100%;
  flex: 1;
  min-height: 0;
}

.stream-canvas-wrap svg {
  width: 100%;
  height: 100%;
  display: block;
  background: #100804;
}

.stream-stats-overlay {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 8px 16px;
  pointer-events: none;
  background: linear-gradient(to top, rgba(16,8,4,0.95) 0%, rgba(16,8,4,0.4) 60%, transparent 100%);
}

.stream-stats {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 12px 20px;
  gap: 12px;
}

.stream-player {
  flex: 1;
  text-align: center;
}

.stream-player-name {
  font-size: 14px;
  color: #fff;
  letter-spacing: 1px;
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stream-percent {
  font-family: 'Orbitron', sans-serif;
  font-size: 48px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
  transition: color 0.15s;
}

.stream-percent.low    { color: #fff; }
.stream-percent.mid    { color: #fbbf24; }
.stream-percent.high   { color: #ff6b35; }
.stream-percent.danger { color: #ff2222; }

.stream-stocks {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-top: 6px;
}

.stream-stock-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #00ff88;
  transition: opacity 0.3s;
}

.stream-stock-dot.lost {
  opacity: 0.15;
}

.stream-vs {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  color: #2a4a34;
  flex-shrink: 0;
}

.stream-connected {
  position: absolute;
  top: 6px;
  right: 8px;
  font-size: 8px;
  letter-spacing: 1px;
  color: #00ff88;
  opacity: 0.6;
  z-index: 2;
}

@keyframes hitflash {
  0% { color: #ff4444; }
  100% { color: inherit; }
}

.stream-percent.hit {
  animation: hitflash 0.3s ease-out;
}

/* Odds bar */
.odds-bar-wrap {
  margin: 10px 0 6px;
}

.odds-bar {
  display: flex;
  height: 24px;
  border-radius: 6px;
  overflow: hidden;
  background: rgba(255,255,255,0.04);
}

.odds-bar-a {
  background: rgba(0, 255, 136, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  font-family: 'Space Mono', monospace;
  color: #fff;
  transition: width 0.6s ease;
  min-width: 24px;
}

.odds-bar-b {
  background: rgba(255, 107, 53, 0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  font-family: 'Space Mono', monospace;
  color: #fff;
  transition: width 0.6s ease;
  min-width: 24px;
}

.odds-pool-total {
  text-align: center;
  font-size: 10px;
  color: #3a5a44;
  font-family: 'Space Mono', monospace;
  margin-top: 4px;
}

/* Prediction market — compact, flex participant */
.prediction-section {
  border: 1px solid rgba(0, 255, 136, 0.1);
  border-radius: 10px;
  background: #0e0e16;
  padding: 12px 16px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.prediction-header {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #00ff88;
  margin-bottom: 12px;
}

.prediction-placeholder {
  color: #1a2a1f;
  font-size: 13px;
  text-align: center;
  padding: 20px 0;
}

/* Bottom row: activity + QR */
.bottom-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

.activity-section {
  border: 1px solid rgba(0, 255, 136, 0.08);
  border-radius: 10px;
  background: #0e0e16;
  padding: 10px 16px;
  min-width: 0;
  max-height: 160px;
  overflow-y: auto;
  scrollbar-width: none;
}
.activity-section::-webkit-scrollbar { display: none; }

.activity-header {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #6a8a74;
  margin-bottom: 10px;
}

.activity-list {
  list-style: none;
}
.activity-list li {
  font-size: 12px;
  color: #4a6a54;
  padding: 3px 0;
  border-bottom: 1px solid rgba(0, 255, 136, 0.03);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.activity-list li:last-child { border-bottom: none; }

/* QR codes */
.qr-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: #0e0e16;
  border: 1px solid rgba(0, 255, 136, 0.1);
  border-radius: 10px;
  padding: 12px;
  width: 140px;
}

.qr-img {
  width: 100px;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  background: #fff;
  padding: 4px;
  overflow: hidden;
}
.qr-img img {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
}

.qr-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #00ff88;
  text-align: center;
}

.qr-url {
  font-size: 9px;
  color: #3a5a44;
  font-family: monospace;
  text-align: center;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Bottom-left fighter login QR */
.fighter-qr {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 50;
}

/* ── Error ─────────────────────────────────────────────────── */

.error-toast {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1e0000;
  border: 1px solid #5a1a1a;
  color: #ff4466;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  z-index: 100;
}
.error-toast.visible { display: block; }

.waiting {
  color: #6a8a74;
  font-size: 18px;
  font-weight: 600;
  text-align: center;
  padding: 40px;
}

/* ── Registrant List (pre-bracket) ───────────────────────── */

.registrant-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 16px 0;
  max-width: 500px;
}

.registrant-list-header {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #6a8a74;
  margin-bottom: 8px;
}

.registrant-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: rgba(0, 255, 136, 0.03);
  border: 1px solid rgba(0, 255, 136, 0.06);
  border-radius: 6px;
  animation: fadeIn 0.3s ease-out both;
  animation-delay: calc(var(--i, 0) * 0.05s);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

.registrant-num {
  font-size: 11px;
  color: #555;
  min-width: 22px;
  text-align: right;
}

.registrant-name {
  font-size: 14px;
  font-weight: 700;
  flex: 1;
}

.registrant-char {
  font-size: 11px;
  color: #ff6b35;
  background: rgba(255, 107, 53, 0.08);
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}

.registrant-by {
  font-size: 11px;
  color: #555;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(0, 255, 136, 0.3); }
  50% { opacity: 0.6; box-shadow: 0 0 16px rgba(0, 255, 136, 0.5); }
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-left">
    <span class="nav-logo">No Johns</span>
    <div class="nav-divider"></div>
    <span class="nav-title" id="tournament-name">Fight Night</span>
  </div>
  <div class="nav-right">
    <a href="/tournament/play" class="nav-link">Login</a>
    <div id="tournament-status" class="status-pill pending">Loading</div>
  </div>
</nav>

<div id="champion-banner" class="champion-banner"></div>

<!-- Main two-panel layout -->
<div class="main">

  <!-- Left: Bracket -->
  <div class="panel-bracket" id="bracket-outer">
    <div class="bracket" id="bracket">
      <div class="waiting">Waiting for tournament data…</div>
    </div>
    <svg class="connectors" id="connectors"></svg>
  </div>

  <!-- Right: Match + Prediction -->
  <div class="panel-right">

    <!-- Current Match -->
    <div class="current-match">
      <div class="current-match-header">
        <span class="current-match-label" id="cm-label">Current Match</span>
        <span class="current-match-round" id="cm-round"></span>
      </div>
      <div class="current-match-body" id="cm-body">
        <div class="current-match-waiting">Waiting for match...</div>
      </div>
      <div class="stream-area" id="stream-area"></div>
    </div>

    <!-- Prediction Market -->
    <div class="prediction-section">
      <div class="prediction-header">Prediction Market</div>
      <div class="prediction-placeholder" id="prediction-area">
        Market opens when match starts
      </div>
    </div>

    <!-- Bottom: Activity + QR -->
    <div class="bottom-row">
      <div class="activity-section">
        <div class="activity-header">Recent Activity</div>
        <ul class="activity-list" id="activity-list">
          <li>Waiting for bets...</li>
        </ul>
      </div>
      <div class="qr-panel">
        <div class="qr-img" id="market-qr-canvas"></div>
        <div class="qr-label">Scan to Bet</div>
        <div class="qr-url" id="market-qr-url"></div>
      </div>
    </div>

  </div>
</div>

<!-- Fighter login QR — bottom left -->
<div class="fighter-qr">
  <div class="qr-panel">
    <div class="qr-img" id="login-qr-canvas"></div>
    <div class="qr-label">Fighter Login</div>
    <div class="qr-url" id="login-qr-url"></div>
  </div>
</div>

<div class="error-toast" id="error-toast">Connection lost — retrying…</div>

<script>
// ── Config ────────────────────────────────────────────────────

const params   = new URLSearchParams(location.search);
let   tournId  = params.get('t') || params.get('tournament_id') || null;
const arenaBase = (params.get('arena') || 'https://nojohns-arena-production.up.railway.app').replace(/\/$/, '');
const POLL_MS  = 3000;

// ── SVG Fighter Animation Data ──────────────────────────────────
// Source: SlippiLab (MIT) - https://github.com/frankborden/slippilab

const ANIM_ZIP_BASE = '/zips'; // Relative to site root (works when synced to web/)

// Internal character ID (libmelee) → External character ID (Slippi)

// ── Animation Cache ─────────────────────────────────────────────

const animCache = new Map();   // externalId → {animName: string[]}
const animLoading = new Map(); // externalId → Promise

function getAnimName(actionName) {
  return ANIM_REMAPS[actionName] || actionName;
}

async function fetchCharAnims(externalId) {
  if (animCache.has(externalId)) return animCache.get(externalId);
  if (animLoading.has(externalId)) return animLoading.get(externalId);

  const zipName = ZIP_BY_EXT[externalId];
  if (!zipName) return null;

  const promise = (async () => {
    try {
      const resp = await fetch(`${ANIM_ZIP_BASE}/${zipName}.zip`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const buf = await resp.arrayBuffer();
      const unzipped = fflate.unzipSync(new Uint8Array(buf));
      const anims = {};
      for (const [filename, data] of Object.entries(unzipped)) {
        if (!filename.endsWith('.json')) continue;
        const name = filename.replace('.json', '');
        anims[name] = JSON.parse(new TextDecoder().decode(data));
      }
      animCache.set(externalId, anims);
      console.log(`[anim] Loaded ${zipName}: ${Object.keys(anims).length} animations`);
      return anims;
    } catch (err) {
      console.warn(`[anim] Failed to load ${zipName}.zip:`, err);
      return null;
    } finally {
      animLoading.delete(externalId);
    }
  })();

  animLoading.set(externalId, promise);
  return promise;
}

// ── SVG Fighter Renderer ────────────────────────────────────────

// State for the SVG animation layer
let svgCharIds = {};      // port → internalCharId (from match_start)
let svgStageId = null;    // from match_start
let svgFrameData = null;  // latest frame {players: [...]}
let svgInitialized = false;

const SVG_NS = 'http://www.w3.org/2000/svg';

function initSvgCanvas() {
  const area = document.getElementById('stream-area');
  if (!area || area.querySelector('.stream-canvas-wrap')) return;

  // Clear any existing content (text nodes, fallback stats)
  area.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'stream-canvas-wrap';

  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('viewBox', '-100 -80 200 120');
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  svg.id = 'fighter-svg';

  // Glow filter for fighter visibility
  const defs = document.createElementNS(SVG_NS, 'defs');
  const filter = document.createElementNS(SVG_NS, 'filter');
  filter.setAttribute('id', 'fighter-glow');
  filter.setAttribute('x', '-50%'); filter.setAttribute('y', '-50%');
  filter.setAttribute('width', '200%'); filter.setAttribute('height', '200%');
  const blur = document.createElementNS(SVG_NS, 'feGaussianBlur');
  blur.setAttribute('stdDeviation', '1.5');
  blur.setAttribute('result', 'glow');
  const merge = document.createElementNS(SVG_NS, 'feMerge');
  const mergeGlow = document.createElementNS(SVG_NS, 'feMergeNode');
  mergeGlow.setAttribute('in', 'glow');
  const mergeSrc = document.createElementNS(SVG_NS, 'feMergeNode');
  mergeSrc.setAttribute('in', 'SourceGraphic');
  merge.appendChild(mergeGlow);
  merge.appendChild(mergeSrc);
  filter.appendChild(blur);
  filter.appendChild(merge);
  defs.appendChild(filter);
  svg.appendChild(defs);

  // Y-axis inverted group (positive = up in game coords)
  const gameG = document.createElementNS(SVG_NS, 'g');
  gameG.setAttribute('transform', 'scale(1 -1)');
  gameG.id = 'game-layer';
  svg.appendChild(gameG);

  // Stage group
  const stageG = document.createElementNS(SVG_NS, 'g');
  stageG.id = 'stage-layer';
  gameG.appendChild(stageG);

  // Players group with glow
  const playersG = document.createElementNS(SVG_NS, 'g');
  playersG.id = 'players-layer';
  playersG.setAttribute('filter', 'url(#fighter-glow)');
  gameG.appendChild(playersG);

  wrap.appendChild(svg);
  area.appendChild(wrap);
  svgInitialized = true;
}

function renderStage(stageId) {
  const stageG = document.getElementById('stage-layer');
  if (!stageG) return;
  stageG.innerHTML = '';

  const sd = STAGE_DATA[stageId] || DEFAULT_STAGE;

  // Main platform
  const main = document.createElementNS(SVG_NS, 'rect');
  main.setAttribute('x', sd.main.x - sd.main.w / 2);
  main.setAttribute('y', -sd.main.h);
  main.setAttribute('width', sd.main.w);
  main.setAttribute('height', sd.main.h);
  main.setAttribute('fill', '#3a3a3a');
  main.setAttribute('stroke', '#555');
  main.setAttribute('stroke-width', '0.5');
  main.setAttribute('transform', `translate(0 ${sd.main.y})`);
  stageG.appendChild(main);

  // Side/top platforms
  for (const p of sd.plats) {
    const rect = document.createElementNS(SVG_NS, 'rect');
    rect.setAttribute('x', p.x - p.w / 2);
    rect.setAttribute('y', -p.h);
    rect.setAttribute('width', p.w);
    rect.setAttribute('height', p.h);
    rect.setAttribute('fill', '#2a2a2a');
    rect.setAttribute('stroke', '#555');
    rect.setAttribute('stroke-width', '0.5');
    rect.setAttribute('transform', `translate(0 ${p.y})`);
    stageG.appendChild(rect);
  }
}

function renderFighters(players) {
  const playersG = document.getElementById('players-layer');
  if (!playersG) return;
  playersG.innerHTML = '';

  for (let i = 0; i < players.length; i++) {
    const p = players[i];
    const intId = svgCharIds[p.port];
    if (intId == null) continue;

    const extId = EXT_ID_BY_INT[intId];
    if (extId == null) continue;

    const anims = animCache.get(extId);
    const scale = CHAR_SCALE[extId] || 1.0;
    const color = PLAYER_COLORS[i] || '#fff';
    const facing = p.facingDirection || 1;
    const x = p.x || 0;
    const y = p.y || 0;

    const actionName = ACTION_NAMES[p.actionStateId] || 'Wait';
    const animName = getAnimName(actionName);
    const frames = anims?.[animName] || anims?.['Wait1'] || [];

    const frameIdx = Math.floor(Math.max(0, p.actionFrame || 0)) % Math.max(1, frames.length);
    let pathD = frames[frameIdx];

    // Resolve frame references like "frame20"
    if (pathD && pathD.startsWith('frame')) {
      const refIdx = parseInt(pathD.slice(5), 10);
      pathD = frames[refIdx];
    }

    if (!pathD) {
      // Fallback: colored circle
      const circle = document.createElementNS(SVG_NS, 'circle');
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r', '5');
      circle.setAttribute('fill', color);
      circle.setAttribute('opacity', '0.8');
      playersG.appendChild(circle);
      continue;
    }

    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d', pathD);
    path.setAttribute('transform',
      `translate(${x} ${y}) scale(${scale} ${scale}) scale(${facing} 1) scale(0.1 -0.1) translate(-500 -500)`
    );
    path.setAttribute('fill', color);
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('opacity', '1');
    playersG.appendChild(path);
  }
}

function onMatchStartAnim(msg) {
  svgCharIds = {};
  svgStageId = msg.stageId;
  const players = msg.players || [];
  for (const p of players) {
    if (p.characterId != null) {
      svgCharIds[p.port] = p.characterId;
    }
  }

  // Resolve actual character names from characterId (overrides "RANDOM")
  for (const p of players) {
    if (p.characterId != null && streamPlayers[p.port]) {
      const extId = EXT_ID_BY_INT[p.characterId];
      const actualChar = EXT_TO_CHAR[extId];
      if (actualChar) streamPlayers[p.port].character = actualChar;
    }
  }

  // Initialize SVG canvas and render stage
  initSvgCanvas();
  renderStage(svgStageId);

  // Preload character animations
  for (const intId of Object.values(svgCharIds)) {
    const extId = EXT_ID_BY_INT[intId];
    if (extId != null) fetchCharAnims(extId);
  }
}

function onFrameAnim(msg) {
  // Reconnect-and-resume: if we get frames without match_start (mid-match reconnect),
  // derive character IDs from bracket data and initialize SVG anyway.
  if (!svgInitialized) {
    const players = msg.players || [];
    if (players.length < 2) return;
    // Try to derive character IDs from streamPlayers bracket data
    const ports = players.map(p => p.port).sort((a, b) => a - b);
    const charA = streamPlayers._charA;
    const charB = streamPlayers._charB;
    if (!charA && !charB) return; // No bracket data, can't init

    svgCharIds = {};
    if (charA) {
      const intId = CHAR_NAME_TO_INT[charA.toUpperCase()];
      if (intId != null) svgCharIds[ports[0]] = intId;
    }
    if (charB) {
      const intId = CHAR_NAME_TO_INT[charB.toUpperCase()];
      if (intId != null) svgCharIds[ports[1]] = intId;
    }

    if (Object.keys(svgCharIds).length === 0) return; // Couldn't resolve any chars

    console.log('[anim] Reconnect-and-resume: synthesizing SVG init from bracket data');
    initSvgCanvas();
    renderStage(svgStageId); // null stageId → DEFAULT_STAGE, which is fine

    // Preload character animations
    for (const intId of Object.values(svgCharIds)) {
      const extId = EXT_ID_BY_INT[intId];
      if (extId != null) fetchCharAnims(extId);
    }
  }

  svgFrameData = msg;
  renderFighters(msg.players || []);
}

function resetAnim() {
  svgCharIds = {};
  svgStageId = null;
  svgFrameData = null;
  svgInitialized = false;
  // Remove SVG canvas
  const wrap = document.querySelector('.stream-canvas-wrap');
  if (wrap) wrap.remove();
}

  DRMARIO: 'Doc', DR_MARIO: 'Doc', LINK: 'Link', YOUNGLINK: 'Y.Link',
  MEWTWO: 'Mewtwo', ROY: 'Roy', GANONDORF: 'Ganon',
  LUIGI: 'Luigi', MARIO: 'Mario', YOSHI: 'Yoshi',
  DONKEYKONG: 'DK', NESS: 'Ness', PICHU: 'Pichu',
  MRGAMEANDWATCH: 'G&W', GAMEANDWATCH: 'G&W', KIRBY: 'Kirby',
  BOWSER: 'Bowser', ZELDA: 'Zelda', RANDOM: 'Random',
};

function charAbbrev(c) {
  if (!c) return '';
  const key = c.toUpperCase().replace(/[^A-Z_]/g, '');
  return CHAR[key] || c.slice(0, 6);
}

// ── Round label ───────────────────────────────────────────────

function roundLabel(idx, total) {
  const fromEnd = total - 1 - idx;
  if (fromEnd === 0) return 'Grand Final';
  if (fromEnd === 1) return 'Semifinals';
  if (fromEnd === 2) return 'Quarterfinals';
  if (fromEnd === 3) return 'Round of 16';
  return `Round ${idx + 1}`;
}

// ── Render helpers ────────────────────────────────────────────

function entryRow(entry, cls, score) {
  if (!entry) {
    return `<div class="entry-row tbd-row"><span class="entry-name" style="color:#1a1a28">TBD</span></div>`;
  }
  const scoreHtml = (score != null) ? `<span class="entry-score">${score}</span>` : '';
  return `<div class="entry-row ${cls}">
    <span class="char-tag">${charAbbrev(entry.character)}</span>
    <span class="entry-name">${escHtml(entry.name)}</span>
    ${scoreHtml}
  </div>`;
}

function renderMatch(m) {
  const status = m.status || 'pending';
  const winner = m.winner;
  const aWon = winner && m.entry_a && winner.name === m.entry_a.name;
  const bWon = winner && m.entry_b && winner.name === m.entry_b.name;
  const done = status === 'complete' || status === 'coinflip';
  const aScore = done ? m.score_a : null;
  const bScore = done ? m.score_b : null;

  let badge = '';
  if (status === 'playing')  badge = `<div class="match-badge live">● Live</div>`;
  if (status === 'bye')      badge = `<div class="match-badge bye-label">BYE</div>`;
  if (status === 'coinflip') badge = `<div class="match-badge coinflip">Coinflip</div>`;

  const aClass = done ? (aWon ? 'winner' : 'loser') : '';
  const bClass = done ? (bWon ? 'winner' : 'loser') : '';

  return `<div class="match-card ${status}">
    ${badge}
    ${entryRow(m.entry_a, aClass, aWon ? aScore : null)}
    ${entryRow(m.entry_b, bClass, bWon ? bScore : null)}
  </div>`;
}

function renderRegistrants(entries) {
  if (!entries || !entries.length) {
    return '<div class="waiting">Registration open — no entries yet</div>';
  }
  const rows = entries.map((e, i) => `
    <div class="registrant-row" style="--i:${i}">
      <span class="registrant-num">${i + 1}</span>
      <span class="registrant-name">${escHtml(e.name)}</span>
      <span class="registrant-char">${charAbbrev(e.character)}</span>
      ${e.registrant ? `<span class="registrant-by">by ${escHtml(e.registrant)}</span>` : ''}
    </div>
  `).join('');
  return `<div class="registrant-list">
    <div class="registrant-list-header">Registered Fighters — ${entries.length}</div>
    ${rows}
  </div>`;
}

function renderBracket(data) {
  const rounds = data.bracket?.rounds || [];
  const total  = rounds.length;
  if (!total) {
    if (data.status === 'registration') return renderRegistrants(data.entries);
    return '<div class="waiting">No bracket yet</div>';
  }

  let html = '';
  for (let r = 0; r < total; r++) {
    const matches = rounds[r];
    const matchesHtml = matches.map(m =>
      `<div class="match-slot" data-round="${r}" data-slot="${m.slot}">${renderMatch(m)}</div>`
    ).join('');

    html += `<div class="round-col">
      <div class="round-title">${roundLabel(r, total)}</div>
      <div class="round-matches">${matchesHtml}</div>
    </div>`;
  }
  return html;
}

// ── Connector drawing ─────────────────────────────────────────

function drawConnectors(data) {
  const svg   = document.getElementById('connectors');
  const outer = document.getElementById('bracket-outer');
  const oRect = outer.getBoundingClientRect();
  svg.innerHTML = '';

  // Size SVG to bracket scroll area
  svg.style.width  = outer.scrollWidth + 'px';
  svg.style.height = outer.scrollHeight + 'px';

  const rounds = data.bracket?.rounds || [];

  for (let r = 0; r < rounds.length - 1; r++) {
    const nPerRound = rounds[r].length;
    for (let s = 0; s < nPerRound; s += 2) {
      const topEl    = document.querySelector(`[data-round="${r}"][data-slot="${s}"]`);
      const botEl    = document.querySelector(`[data-round="${r}"][data-slot="${s + 1}"]`);
      const parentEl = document.querySelector(`[data-round="${r + 1}"][data-slot="${Math.floor(s / 2)}"]`);
      if (!topEl || !parentEl) continue;

      const scrollX = outer.scrollLeft;
      const scrollY = outer.scrollTop;
      const tr = topEl.getBoundingClientRect();
      const pr = parentEl.getBoundingClientRect();

      const x1  = tr.right  - oRect.left + scrollX;
      const y1  = tr.top    + tr.height / 2 - oRect.top + scrollY;
      const x2  = pr.left   - oRect.left + scrollX;
      const y2  = pr.top    + pr.height / 2 - oRect.top + scrollY;
      const midX = x1 + (x2 - x1) / 2;

      const paths = [`M ${x1} ${y1} L ${midX} ${y1}`];

      if (botEl) {
        const br   = botEl.getBoundingClientRect();
        const yBot = br.top + br.height / 2 - oRect.top + scrollY;
        paths.push(`M ${x1} ${yBot} L ${midX} ${yBot}`);
        paths.push(`M ${midX} ${y1} L ${midX} ${yBot}`);
      }

      paths.push(`M ${midX} ${y2} L ${x2} ${y2}`);

      for (const d of paths) {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('stroke', 'rgba(0, 255, 136, 0.12)');
        path.setAttribute('stroke-width', '1.5');
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke-linecap', 'round');
        svg.appendChild(path);
      }
    }
  }
}

// ── Current Match Panel ───────────────────────────────────────

function updateCurrentMatch(data) {
  const body  = document.getElementById('cm-body');
  const round = document.getElementById('cm-round');

  const rounds = data.bracket?.rounds || [];
  let current = null;

  // Find playing match first, then next pending
  for (const r of rounds) {
    for (const m of r) {
      if (m.status === 'playing') { current = m; break; }
    }
    if (current) break;
  }
  if (!current) {
    for (const r of rounds) {
      for (const m of r) {
        if (m.status === 'pending' && m.entry_a && m.entry_b) { current = m; break; }
      }
      if (current) break;
    }
  }

  if (!current || !current.entry_a || !current.entry_b) {
    body.style.display = '';
    if (data.champion) {
      body.innerHTML = `<div style="text-align:center;">
        <div style="font-family:'Orbitron',sans-serif;font-size:12px;color:#aa8a30;letter-spacing:2px;margin-bottom:8px;">CHAMPION</div>
        <div style="font-family:'Orbitron',sans-serif;font-size:28px;font-weight:700;color:#fbbf24;">${escHtml(data.champion.name)}</div>
        <div style="font-size:13px;color:#997a30;margin-top:4px;">${charAbbrev(data.champion.character)}</div>
      </div>`;
      round.textContent = '';
    } else {
      body.innerHTML = '<div class="current-match-waiting">Waiting for match...</div>';
      round.textContent = '';
    }
    document.getElementById('cm-label').textContent = data.champion ? 'Tournament Complete' : 'Current Match';
    return;
  }

  const a = current.entry_a;
  const b = current.entry_b;
  const isLive = current.status === 'playing';
  const totalRounds = rounds.length;

  document.getElementById('cm-label').textContent = isLive ? 'LIVESTREAM' : 'Up Next';
  document.getElementById('cm-label').style.color = isLive ? '#ff6b35' : '#6a8a74';
  body.style.display = isLive ? 'none' : '';
  round.textContent = `${roundLabel(current.round, totalRounds)} · Match ${current.slot + 1}`;

  body.innerHTML = `<div class="current-match-vs">
    <div class="current-fighter">
      <div class="current-fighter-char">${charAbbrev(a.character)}</div>
      <div class="current-fighter-name">${escHtml(a.name)}</div>
    </div>
    <div class="current-vs-sep">VS</div>
    <div class="current-fighter">
      <div class="current-fighter-char">${charAbbrev(b.character)}</div>
      <div class="current-fighter-name">${escHtml(b.name)}</div>
    </div>
  </div>`;
}

function applyData(data) {
  document.getElementById('tournament-name').textContent = data.name || 'Fight Night';

  const pill = document.getElementById('tournament-status');
  pill.className = `status-pill ${data.status || 'pending'}`;
  pill.textContent = data.status === 'active' ? 'In Progress'
                   : data.status === 'complete' ? 'Complete'
                   : data.status === 'registration' ? 'Registration'
                   : 'Upcoming';

  const banner = document.getElementById('champion-banner');
  if (data.champion) {
    banner.textContent = `Champion — ${data.champion.name}  ·  ${charAbbrev(data.champion.character)}`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }

  const bracket = document.getElementById('bracket');
  const newHtml = renderBracket(data);
  if (bracket._lastHtml !== newHtml) {
    bracket.innerHTML = newHtml;
    bracket._lastHtml = newHtml;
  }

  updateCurrentMatch(data);
  updatePrediction(data);
  updateActivity(data);
  updateMatchStream(data);

  const liveEl = document.querySelector('.match-card.playing');
  if (liveEl) {
    liveEl.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
  }

// ── Odds Polling ─────────────────────────────────────────────

let oddsTimer = null;
let oddsPoolId = null;

function startOddsPolling(poolId) {
  if (oddsPoolId === poolId && oddsTimer) return;
  stopOddsPolling();
  oddsPoolId = poolId;
  fetchOdds();
  oddsTimer = setInterval(fetchOdds, 5000);
}

function stopOddsPolling() {
  if (oddsTimer) clearInterval(oddsTimer);
  oddsTimer = null;
  oddsPoolId = null;
}

async function fetchOdds() {
  if (oddsPoolId == null) return;
  try {
    const res = await fetch(`${arenaBase}/pools/${oddsPoolId}/odds`);
    if (!res.ok) return;
    const data = await res.json();
    renderOddsBar(data);
  } catch (e) {}
}

function renderOddsBar(data) {
  const barA = document.getElementById('odds-a');
  const barB = document.getElementById('odds-b');
  const total = document.getElementById('odds-total');
  if (!barA || !barB || !total) return;

  const pctA = data.pct_a || 50;
  const pctB = data.pct_b || 50;
  const totalWei = BigInt(data.total || '0');
  const totalMon = Number(totalWei) / 1e18;

  barA.style.width = `${Math.max(pctA, 8)}%`;
  barB.style.width = `${Math.max(pctB, 8)}%`;
  barA.textContent = totalWei > 0n ? `${pctA}%` : '—';
  barB.textContent = totalWei > 0n ? `${pctB}%` : '—';
  total.textContent = totalWei > 0n
    ? `Pool: ${totalMon.toFixed(2)} MON`
    : 'Pool: 0 MON · Scan QR to bet';
}

// ── Activity Feed ────────────────────────────────────────────

// ── Activity feed: bets + match results ────────────────────

let activityItems = [];  // { text, type, time }
let lastBetCount = {};   // pool_id -> count of bets we've seen

function addActivity(text, type) {
  activityItems.unshift({ text, type, time: Date.now() });
  if (activityItems.length > 10) activityItems.length = 10;
  renderActivity();
}

function renderActivity() {
  const list = document.getElementById('activity-list');
  if (activityItems.length === 0) {
    list.innerHTML = '<li>Waiting for bets...</li>';
    return;
  }
  list.innerHTML = activityItems.map(a => {
    const cls = a.type === 'bet' ? 'style="color:#ff6b35;"'
              : a.type === 'win' ? 'style="color:#00ff88;"'
              : '';
    return `<li ${cls}>${a.text}</li>`;
  }).join('');
}

function updateActivity(data) {
  // Add match results
  const rounds = data.bracket?.rounds || [];
  for (const r of rounds) {
    for (const m of r) {
      if ((m.status === 'complete' || m.status === 'coinflip') && m.winner) {
        const key = `result-${m.round}-${m.slot}`;
        if (activityItems.some(a => a._key === key)) continue;
        const loser = (m.entry_a && m.winner.name === m.entry_a.name) ? m.entry_b : m.entry_a;
        const label = m.status === 'coinflip' ? 'COIN' : 'WIN';
        const scoreStr = (m.score_a != null && m.score_b != null)
          ? ` (${m.score_a}-${m.score_b})` : '';
        const item = {
          text: `${escHtml(m.winner.name)} ${label}${scoreStr} vs ${loser ? escHtml(loser.name) : 'BYE'}`,
          type: 'win', time: Date.now(), _key: key,
        };
        activityItems.unshift(item);
      }
    }
  }
  if (activityItems.length > 10) activityItems.length = 10;
  renderActivity();

  // Poll for bet activity on current pool
  pollBetActivity(data);
}

let betPollInFlight = false;

async function pollBetActivity(data) {
  if (betPollInFlight) return; // Don't stack requests
  // Find current pool_id from any active or recent match
  const rounds = data.bracket?.rounds || [];
  let poolId = null;
  let entryA = null, entryB = null;
  for (const r of rounds) {
    for (const m of r) {
      if (m.pool_id && (m.status === 'playing' || m.status === 'complete')) {
        poolId = m.pool_id;
        entryA = m.entry_a;
        entryB = m.entry_b;
      }
    }
  }
  if (!poolId) return;

  betPollInFlight = true;
  try {
    const resp = await fetch(`${arenaBase}/pools/${poolId}/bets`);
    if (!resp.ok) {
      console.warn(`[bets] /pools/${poolId}/bets returned ${resp.status}`);
      return;
    }
    const result = await resp.json();
    const bets = result.bets || [];
    const prev = lastBetCount[poolId] || 0;

    if (bets.length > prev) {
      const newBets = bets.slice(prev);
      for (const b of newBets) {
        const side = b.betOnA ? (entryA?.name || 'Player A') : (entryB?.name || 'Player B');
        const addr = b.bettor.slice(0, 6) + '...' + b.bettor.slice(-4);
        addActivity(`${addr} bet ${b.amount_mon} MON on ${escHtml(side)}`, 'bet');
      }
    }
    lastBetCount[poolId] = bets.length;
  } catch (e) {
    console.warn('[bets] pollBetActivity error:', e);
  } finally {
    betPollInFlight = false;
  }
}

// ── Live Match WebSocket Stream ───────────────────────────────

let matchWs = null;
let matchWsId = null; // arena_match_id currently connected to
let streamPlayers = {}; // port -> { name, percent, stocks, maxStocks }

function wsUrl(arenaMatchId) {
  const base = arenaBase.replace(/^http/, 'ws');
  return `${base}/ws/match/${arenaMatchId}`;
}

function connectMatchStream(arenaMatchId, entryA, entryB) {
  if (matchWsId === arenaMatchId && matchWs && matchWs.readyState <= 1) return;
  disconnectMatchStream();

  matchWsId = arenaMatchId;
  // Pre-populate from bracket data so names show immediately, even without match_start.
  // Ports 1 and 2 are the standard assignment for arena matches.
  streamPlayers = {
    _nameA: entryA?.name,
    _nameB: entryB?.name,
    _charA: entryA?.character,
    _charB: entryB?.character,
    1: { name: entryA?.name || 'P1', character: entryA?.character, percent: 0, stocks: 4, maxStocks: 4 },
    2: { name: entryB?.name || 'P2', character: entryB?.character, percent: 0, stocks: 4, maxStocks: 4 },
  };

  try {
    matchWs = new WebSocket(wsUrl(arenaMatchId));
  } catch (e) {
    return;
  }

  matchWs.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      handleStreamMessage(msg);
    } catch (e) {}
  };

  matchWs.onclose = () => {
    // Reconnect if we still expect this match
    if (matchWsId === arenaMatchId) {
      setTimeout(() => {
        if (matchWsId === arenaMatchId) connectMatchStream(arenaMatchId, entryA, entryB);
      }, 2000);
    }
  };

  matchWs.onerror = () => {};
}

function disconnectMatchStream() {
  if (matchWs) {
    matchWsId = null;
    try { matchWs.close(); } catch (e) {}
    matchWs = null;
  }
  streamPlayers = {};
  renderStreamIdle();
}

function handleStreamMessage(msg) {
  const area = document.getElementById('stream-area');
  if (!area) return;

  if (msg.type === 'match_start') {
    // Initialize player tracking with port info
    const players = msg.players || [];
    for (const p of players) {
      streamPlayers[p.port] = {
        name: p.displayName || p.connectCode || `P${p.port}`,
        percent: 0,
        stocks: 4,
        maxStocks: 4,
      };
    }
    // Try to match ports to entry names from bracket data
    const ports = Object.keys(streamPlayers).filter(k => !k.startsWith('_')).sort();
    if (ports.length >= 2 && streamPlayers._nameA) {
      streamPlayers[ports[0]].name = streamPlayers._nameA;
      streamPlayers[ports[0]].character = streamPlayers._charA;
      if (streamPlayers._nameB) {
        streamPlayers[ports[1]].name = streamPlayers._nameB;
        streamPlayers[ports[1]].character = streamPlayers._charB;
      }
    }
    // Initialize SVG animation
    onMatchStartAnim(msg);
    renderStreamStats();
    return;
  }

  if (msg.type === 'frame') {
    const players = msg.players || [];
    // On first frame, map actual ports to bracket names
    const knownPorts = Object.keys(streamPlayers).filter(k => !k.startsWith('_'));
    if (knownPorts.length < 2 && players.length >= 2) {
      // First time seeing ports — assign bracket names
      const sorted = [...players].sort((a, b) => a.port - b.port);
      for (let i = 0; i < sorted.length; i++) {
        const name = i === 0 ? (streamPlayers._nameA || `P${sorted[i].port}`)
                             : (streamPlayers._nameB || `P${sorted[i].port}`);
        const character = i === 0 ? streamPlayers._charA : streamPlayers._charB;
        streamPlayers[sorted[i].port] = { name, character, percent: 0, stocks: 4, maxStocks: 4 };
      }
    }
    for (const p of players) {
      if (!streamPlayers[p.port]) {
        streamPlayers[p.port] = { name: `P${p.port}`, percent: 0, stocks: 4, maxStocks: 4 };
      }
      const prev = streamPlayers[p.port];
      const prevPercent = prev.percent;
      prev.percent = Math.round(p.percent || 0);
      prev.stocks = p.stocks ?? prev.stocks;
      prev._hit = (prev.percent > prevPercent && prevPercent >= 0);
    }
    // Update SVG fighters
    onFrameAnim(msg);
    renderStreamStats();
    return;
  }

  if (msg.type === 'game_end') {
    // Flash the winner briefly — stream will reset on next match_start
    renderStreamStats();
    return;
  }

  if (msg.type === 'match_end') {
    // Match over — stream will disconnect on next bracket poll
    return;
  }
}

function renderStreamStats() {
  const area = document.getElementById('stream-area');
  if (!area) return;

  const ports = Object.keys(streamPlayers).filter(k => !k.startsWith('_')).sort();
  if (ports.length < 2) {
    // Keep SVG canvas if it exists, just update the non-SVG part
    const existing = area.querySelector('.stream-canvas-wrap');
    if (existing) {
      // Remove old overlay/badge if any, keep SVG
      const oldOverlay = area.querySelector('.stream-stats-overlay');
      if (oldOverlay) oldOverlay.remove();
      const oldBadge = area.querySelector('.stream-connected');
      if (oldBadge) oldBadge.remove();
      const badge = document.createElement('span');
      badge.className = 'stream-connected';
      badge.textContent = 'CONNECTING';
      area.appendChild(badge);
    } else {
      area.innerHTML = '<span class="stream-connected">CONNECTING</span><span>Waiting for game data…</span>';
    }
    return;
  }

  const p1 = streamPlayers[ports[0]];
  const p2 = streamPlayers[ports[1]];

  function pctClass(pct) {
    if (pct >= 150) return 'danger';
    if (pct >= 100) return 'high';
    if (pct >= 50) return 'mid';
    return 'low';
  }

  function stockDots(stocks, max) {
    let html = '';
    for (let i = 0; i < max; i++) {
      html += `<div class="stream-stock-dot${i >= stocks ? ' lost' : ''}"></div>`;
    }
    return html;
  }

  function nameWithChar(player) {
    const charStr = player.character ? ` <span style="color:#6a8a74;font-weight:400;">| ${charAbbrev(player.character)}</span>` : '';
    return `<strong>${escHtml(player.name)}</strong>${charStr}`;
  }

  const statsHtml = `
    <div class="stream-player">
      <div class="stream-player-name">${nameWithChar(p1)}</div>
      <div class="stream-percent ${pctClass(p1.percent)}${p1._hit ? ' hit' : ''}">${p1.percent}%</div>
      <div class="stream-stocks">${stockDots(p1.stocks, p1.maxStocks)}</div>
    </div>
    <div class="stream-player">
      <div class="stream-player-name">${nameWithChar(p2)}</div>
      <div class="stream-percent ${pctClass(p2.percent)}${p2._hit ? ' hit' : ''}">${p2.percent}%</div>
      <div class="stream-stocks">${stockDots(p2.stocks, p2.maxStocks)}</div>
    </div>`;

  // If SVG canvas is active, use overlay layout
  if (svgInitialized && area.querySelector('.stream-canvas-wrap')) {
    // Update or create overlay
    let overlay = area.querySelector('.stream-stats-overlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.className = 'stream-stats-overlay';
      area.querySelector('.stream-canvas-wrap').appendChild(overlay);
    }
    overlay.innerHTML = statsHtml;

    // No separate LIVE badge — header already says LIVESTREAM
    const oldBadge = area.querySelector('.stream-connected');
    if (oldBadge) oldBadge.remove();
  } else {
    // Fallback: text-only layout (no SVG loaded)
    area.innerHTML = `
      <span class="stream-connected">● LIVE</span>
      <div class="stream-stats">${statsHtml}</div>`;
  }

  // Clear hit flags after render
  p1._hit = false;
  p2._hit = false;
}

function renderStreamIdle() {
  const area = document.getElementById('stream-area');
  if (area) {
    resetAnim();
    area.innerHTML = '';
  }
}

// Called from applyData — connect/disconnect based on bracket state
function updateMatchStream(data) {
  const rounds = data.bracket?.rounds || [];
  let playing = null;
  for (const r of rounds) {
    for (const m of r) {
      if (m.status === 'playing' && m.arena_match_id) { playing = m; break; }
    }
    if (playing) break;
  }

  if (playing) {
    connectMatchStream(playing.arena_match_id, playing.entry_a, playing.entry_b);
  } else {
    disconnectMatchStream();
  }
}

// ── Fetch & poll ──────────────────────────────────────────────

let pollTimer = null;

async function fetchBracket() {
  if (!tournId) {
    try {
      const res = await fetch(`${arenaBase}/tournaments`);
      if (!res.ok) throw new Error(res.status);
      const list = await res.json();
      const tourn = (list.tournaments || []).find(t => t.featured)
                 || (list.tournaments || []).find(t => t.status === 'active')
                 || (list.tournaments || [])[0];
      if (tourn) {
        tournId = tourn.id;
      } else {
        document.getElementById('bracket').innerHTML =
          '<div class="waiting">No tournaments yet.</div>';
        return;
      }
    } catch (e) {
      showError();
      return;
    }
  }

  try {
    const res = await fetch(`${arenaBase}/tournaments/${tournId}/bracket`);
    hideError();
    if (!res.ok) {
      if (res.status === 404) {
        document.getElementById('bracket').innerHTML =
          `<div class="waiting">Tournament not found.</div>`;
      }
      return;
    }
    const data = await res.json();
    applyData(data);
  } catch (e) {
    showError();
  }
}

function showError() { document.getElementById('error-toast').classList.add('visible'); }
function hideError() { document.getElementById('error-toast').classList.remove('visible'); }

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function poll() {
  fetchBracket().finally(() => {
    pollTimer = setTimeout(poll, POLL_MS);
  });
}

// Redraw connectors on resize
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => fetchBracket(), 200);
});

// ── QR Codes ──────────────────────────────────────────────────

// QR codes — generated client-side via qrcode-generator
function makeQR(text) {
  var qr = qrcode(0, 'M');
  qr.addData(text);
  qr.make();
  return qr.createImgTag(3, 0);  // cellSize=3, margin=0
}

function renderQRCodes(tournamentId) {
  const base = params.get('site_url') || location.origin;
  const betUrl   = params.get('bet_url') || (base + '/tournament/bet');
  const loginUrl = params.get('login_url') || (base + '/tournament/play');

  try {
    document.getElementById('market-qr-canvas').innerHTML = makeQR(betUrl);
    document.getElementById('login-qr-canvas').innerHTML = makeQR(loginUrl);
  } catch(e) {
    console.warn('[qr] QR generation failed:', e);
  }
  document.getElementById('market-qr-url').textContent = betUrl;
  document.getElementById('login-qr-url').textContent = loginUrl;
}
renderQRCodes(null);

// Start polling
poll();
</script>
