<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Fight Night — Bracket Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #08080d;
  background-image: radial-gradient(ellipse at 50% 0%, rgba(0, 255, 136, 0.03) 0%, transparent 60%);
  color: #fff;
  font-family: 'Space Mono', 'SF Mono', Consolas, monospace;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

/* ── Header ────────────────────────────────────────────────── */

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 68px;
  border-bottom: 1px solid rgba(0, 255, 136, 0.08);
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #6a8a74;
}

.divider {
  width: 1px;
  height: 20px;
  background: rgba(0, 255, 136, 0.15);
}

.tournament-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.status-pill {
  font-family: 'Orbitron', sans-serif;
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.status-pill.pending  { background: rgba(0, 255, 136, 0.08); color: #555; }
.status-pill.active   { background: rgba(0, 255, 136, 0.08); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.25); }
.status-pill.complete { background: #1a1400; color: #fbbf24; border: 1px solid #6a5000; }

/* ── Champion Banner ────────────────────────────────────────── */

.champion-banner {
  display: none;
  font-family: 'Orbitron', sans-serif;
  background: linear-gradient(90deg, #1a1400, #1a1400, #1a1400);
  border-bottom: 1px solid #6a5000;
  padding: 10px 40px;
  text-align: center;
  font-size: 26px;
  color: #fbbf24;
  font-weight: 700;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.champion-banner.visible { display: block; }

/* ── Bracket Layout ─────────────────────────────────────────── */

.bracket-outer {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 40px;
  position: relative;
  overflow: auto;
}

.bracket {
  display: flex;
  flex-direction: row;
  gap: 0;
  position: relative;
  z-index: 1;
  height: 100%;
}

.round-col {
  display: flex;
  flex-direction: column;
  width: 240px;
}

.round-title {
  font-family: 'Orbitron', sans-serif;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #6a8a74;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.round-matches {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
}

/* ── Match Card ─────────────────────────────────────────────── */

.match-slot {
  display: flex;
  align-items: center;
  padding: 0 7px;
  min-height: 100px;
}

.match-card {
  width: 100%;
  border: 1px solid rgba(0, 255, 136, 0.08);
  border-radius: 7px;
  overflow: hidden;
  background: #0e0e16;
  transition: border-color 0.4s, box-shadow 0.4s;
}

.match-card.playing {
  border-color: rgba(0, 255, 136, 0.25);
  box-shadow: 0 0 24px rgba(0, 255, 136, 0.2), 0 0 48px rgba(0, 255, 136, 0.05);
}

.match-card.complete {
  border-color: rgba(0, 255, 136, 0.08);
}

.match-card.bye {
  background: #0a0a0a;
  border-color: #161616;
}

.match-card.coinflip {
  border-color: rgba(170, 102, 255, 0.25);
}

.match-card.pending {
  border-color: rgba(0, 255, 136, 0.08);
}

/* ── Match Badge ────────────────────────────────────────────── */

.match-badge {
  font-family: 'Orbitron', sans-serif;
  padding: 3px 10px;
  text-align: center;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
}

.match-badge.live      { background: #00ff88; color: #000; animation: pulse 1.8s ease-in-out infinite; }
.match-badge.bye-label { background: rgba(0, 255, 136, 0.08); color: #6a8a74; }
.match-badge.coinflip  { background: #2a1a3a; color: #aa66ff; }

/* ── Entry Row ──────────────────────────────────────────────── */

.entry-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  min-height: 48px;
}

.entry-row + .entry-row {
  border-top: 1px solid rgba(0, 255, 136, 0.08);
}

.entry-row.winner { background: rgba(0, 255, 136, 0.06); }
.entry-row.loser  { opacity: 0.38; }

.char-tag {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: #6a8a74;
  flex-shrink: 0;
  width: 42px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
}

.entry-name {
  font-family: 'Space Mono', monospace;
  flex: 1;
  font-size: 18px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.entry-score {
  font-size: 18px;
  font-weight: 700;
  color: #00ff88;
  flex-shrink: 0;
}

.tbd-row {
  color: rgba(0, 255, 136, 0.15);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── SVG Connectors ─────────────────────────────────────────── */

.connectors {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ── Error / Status ─────────────────────────────────────────── */

.waiting {
  color: #6a8a74;
  font-size: 24px;
  font-weight: 600;
  text-align: center;
}

.error-toast {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1e0000;
  border: 1px solid #5a1a1a;
  color: #ff4466;
  padding: 10px 18px;
  border-radius: 6px;
  font-size: 15px;
  z-index: 100;
}
.error-toast.visible { display: block; }

/* ── Bet QR Panel ────────────────────────────────────────────── */

.bet-qr {
  position: fixed;
  bottom: 28px;
  left: 28px;
  background: #14141f;
  border: 1px solid rgba(0, 255, 136, 0.15);
  border-radius: 12px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 50;
  box-shadow: 0 0 16px rgba(0, 255, 136, 0.05);
}

.bet-qr-img {
  width: 160px;
  height: 160px;
  display: block;
  border-radius: 6px;
  background: #fff;
  padding: 6px;
}

.bet-qr-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #00ff88;
  text-align: center;
}

.bet-qr-url {
  font-size: 11px;
  color: #6a8a74;
  font-family: monospace;
  text-align: center;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Animations ─────────────────────────────────────────────── */

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(0, 255, 136, 0.3); }
  50% { opacity: 0.6; box-shadow: 0 0 16px rgba(0, 255, 136, 0.5); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">No Johns</span>
    <div class="divider"></div>
    <span class="tournament-name" id="tournament-name">Fight Night</span>
  </div>
  <div id="tournament-status" class="status-pill pending">Loading</div>
</div>

<div id="champion-banner" class="champion-banner"></div>

<div class="bracket-outer" id="bracket-outer">
  <div class="bracket" id="bracket">
    <div class="waiting">Waiting for tournament data…</div>
  </div>
  <svg class="connectors" id="connectors"></svg>
</div>

<div class="error-toast" id="error-toast">Connection lost — retrying…</div>

<div class="bet-qr" id="bet-qr">
  <img class="bet-qr-img" id="bet-qr-img" alt="QR code — scan to bet" />
  <div class="bet-qr-label">Scan to Bet</div>
  <div class="bet-qr-url" id="bet-qr-url"></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────

const params   = new URLSearchParams(location.search);
let   tournId  = params.get('t') || params.get('tournament_id') || null;
const arenaBase = (params.get('arena') || 'https://nojohns-arena-production.up.railway.app').replace(/\/$/, '');
const POLL_MS  = 3000;

// ── Character abbreviations ───────────────────────────────────

const CHAR = {
  FOX: 'Fox', FALCO: 'Falco', MARTH: 'Marth', SHEIK: 'Sheik',
  JIGGLYPUFF: 'Puff', PEACH: 'Peach', ICECLIMBERS: 'ICs', POPO: 'ICs',
  CAPTAINFALCON: 'Falcon', PIKACHU: 'Pika', SAMUS: 'Samus',
  DR_MARIO: 'Doc', LINK: 'Link', YOUNGLINK: 'Y.Link',
  MEWTWO: 'Mewtwo', ROY: 'Roy', GANONDORF: 'Ganon',
  LUIGI: 'Luigi', MARIO: 'Mario', YOSHI: 'Yoshi',
  DONKEYKONG: 'DK', NESS: 'Ness', PICHU: 'Pichu',
  MRGAMEANDWATCH: 'G&W', KIRBY: 'Kirby', BOWSER: 'Bowser', ZELDA: 'Zelda',
};

function charAbbrev(c) {
  if (!c) return '';
  const key = c.toUpperCase().replace(/[^A-Z_]/g, '');
  return CHAR[key] || c.slice(0, 6);
}

// ── Round label ───────────────────────────────────────────────

function roundLabel(idx, total) {
  const fromEnd = total - 1 - idx;
  if (fromEnd === 0) return 'Grand Final';
  if (fromEnd === 1) return 'Semifinals';
  if (fromEnd === 2) return 'Quarterfinals';
  if (fromEnd === 3) return 'Round of 16';
  return `Round ${idx + 1}`;
}

// ── Render helpers ────────────────────────────────────────────

function entryRow(entry, cls, score) {
  if (!entry) {
    return `<div class="entry-row tbd-row"><span class="entry-name" style="color:#1a1a28">TBD</span></div>`;
  }
  const scoreHtml = (score != null) ? `<span class="entry-score">${score}</span>` : '';
  return `<div class="entry-row ${cls}">
    <span class="char-tag">${charAbbrev(entry.character)}</span>
    <span class="entry-name">${escHtml(entry.name)}</span>
    ${scoreHtml}
  </div>`;
}

function renderMatch(m) {
  const status = m.status || 'pending';
  const winner = m.winner;

  // Determine winner/loser classes
  const aWon = winner && m.entry_a && winner.name === m.entry_a.name;
  const bWon = winner && m.entry_b && winner.name === m.entry_b.name;
  const done = status === 'complete' || status === 'coinflip';
  const aScore = done ? m.score_a : null;
  const bScore = done ? m.score_b : null;

  let badge = '';
  if (status === 'playing')  badge = `<div class="match-badge live">● Live</div>`;
  if (status === 'bye')      badge = `<div class="match-badge bye-label">BYE</div>`;
  if (status === 'coinflip') badge = `<div class="match-badge coinflip">Coinflip</div>`;

  const aClass = done ? (aWon ? 'winner' : 'loser') : '';
  const bClass = done ? (bWon ? 'winner' : 'loser') : '';

  return `<div class="match-card ${status}">
    ${badge}
    ${entryRow(m.entry_a, aClass, aWon ? aScore : null)}
    ${entryRow(m.entry_b, bClass, bWon ? bScore : null)}
  </div>`;
}

function renderBracket(data) {
  const rounds = data.bracket.rounds;
  const total  = rounds.length;

  let html = '';
  for (let r = 0; r < total; r++) {
    const matches = rounds[r];
    const matchesHtml = matches.map(m =>
      `<div class="match-slot" data-round="${r}" data-slot="${m.slot}">${renderMatch(m)}</div>`
    ).join('');

    html += `<div class="round-col">
      <div class="round-title">${roundLabel(r, total)}</div>
      <div class="round-matches">${matchesHtml}</div>
    </div>`;
  }
  return html;
}

// ── Connector drawing ─────────────────────────────────────────

function drawConnectors(data) {
  const svg    = document.getElementById('connectors');
  const outer  = document.getElementById('bracket-outer');
  const oRect  = outer.getBoundingClientRect();
  svg.innerHTML = '';

  const rounds = data.bracket.rounds;

  for (let r = 0; r < rounds.length - 1; r++) {
    const nPerRound = rounds[r].length;
    for (let s = 0; s < nPerRound; s += 2) {
      const topEl    = document.querySelector(`[data-round="${r}"][data-slot="${s}"]`);
      const botEl    = document.querySelector(`[data-round="${r}"][data-slot="${s + 1}"]`);
      const parentEl = document.querySelector(`[data-round="${r + 1}"][data-slot="${Math.floor(s / 2)}"]`);
      if (!topEl || !parentEl) continue;

      const tr = topEl.getBoundingClientRect();
      const pr = parentEl.getBoundingClientRect();

      const x1  = tr.right  - oRect.left;
      const y1  = tr.top    + tr.height / 2 - oRect.top;
      const x2  = pr.left   - oRect.left;
      const y2  = pr.top    + pr.height / 2 - oRect.top;
      const midX = x1 + (x2 - x1) / 2;

      const paths = [`M ${x1} ${y1} L ${midX} ${y1}`]; // top child → mid

      if (botEl) {
        const br   = botEl.getBoundingClientRect();
        const yBot = br.top + br.height / 2 - oRect.top;
        paths.push(`M ${x1} ${yBot} L ${midX} ${yBot}`);  // bottom child → mid
        paths.push(`M ${midX} ${y1} L ${midX} ${yBot}`);  // vertical connector
      }

      paths.push(`M ${midX} ${y2} L ${x2} ${y2}`); // mid → parent

      for (const d of paths) {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('stroke', 'rgba(0, 255, 136, 0.12)');
        path.setAttribute('stroke-width', '1.5');
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke-linecap', 'round');
        svg.appendChild(path);
      }
    }
  }
}

// ── DOM update ────────────────────────────────────────────────

function applyData(data) {
  document.getElementById('tournament-name').textContent = data.name || 'Fight Night';

  const pill = document.getElementById('tournament-status');
  pill.className = `status-pill ${data.status || 'pending'}`;
  pill.textContent = data.status === 'active' ? 'In Progress'
                   : data.status === 'complete' ? 'Complete'
                   : 'Upcoming';

  const banner = document.getElementById('champion-banner');
  if (data.champion) {
    const ch = data.champion;
    banner.textContent = `Champion — ${ch.name}  ·  ${charAbbrev(ch.character)}`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }

  const bracket = document.getElementById('bracket');
  bracket.innerHTML = renderBracket(data);

  // Redraw connectors after layout settles
  requestAnimationFrame(() => requestAnimationFrame(() => drawConnectors(data)));
}

// ── Fetch & poll ──────────────────────────────────────────────

let lastEtag = null;
let pollTimer = null;

async function fetchBracket() {
  if (!tournId) {
    // Auto-discover first active/pending tournament
    try {
      const res = await fetch(`${arenaBase}/tournaments`);
      if (!res.ok) throw new Error(res.status);
      const list = await res.json();
      const tourn = (list.tournaments || []).find(t => t.status === 'active')
                 || (list.tournaments || [])[0];
      if (tourn) {
        tournId = tourn.id;
      } else {
        document.getElementById('bracket').innerHTML =
          `<div class="waiting">No tournaments yet. Create one from the admin panel.</div>`;
        return;
      }
    } catch (e) {
      showError();
      return;
    }
  }

  try {
    const res = await fetch(`${arenaBase}/tournaments/${tournId}/bracket`);
    hideError();
    if (!res.ok) {
      if (res.status === 404) {
        document.getElementById('bracket').innerHTML =
          `<div class="waiting">Tournament "${tournId}" not found.</div>`;
      }
      return;
    }
    const data = await res.json();
    applyData(data);
  } catch (e) {
    showError();
  }
}

function showError() { document.getElementById('error-toast').classList.add('visible'); }
function hideError() { document.getElementById('error-toast').classList.remove('visible'); }

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function poll() {
  fetchBracket().finally(() => {
    pollTimer = setTimeout(poll, POLL_MS);
  });
}

// Redraw connectors on resize
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const bracket = document.getElementById('bracket');
    const existing = bracket.querySelector('[data-round]');
    if (existing) {
      // Re-read last data from DOM (round count / slot count)
      // Just re-fetch — simpler than caching
      fetchBracket();
    }
  }, 200);
});

// ── Bet QR Code ───────────────────────────────────────────────

(function initBetQr() {
  const betUrl = params.get('bet_url') || (location.origin + '/bet');
  const qrImg  = document.getElementById('bet-qr-img');
  const qrUrl  = document.getElementById('bet-qr-url');

  qrImg.src = 'https://chart.googleapis.com/chart?cht=qr&chs=320x320&chl='
    + encodeURIComponent(betUrl) + '&choe=UTF-8&chld=M|1';
  qrUrl.textContent = betUrl;
  qrUrl.title = betUrl;
})();

// Start polling
poll();
</script>

</body>
</html>
